services:
  postgres:
    image: postgres:15
    container_name: alpha_postgres
    environment:
      POSTGRES_USER: arpit
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: alpha_crm
    ports:
      - "5433:5432"
    volumes:
      - postgres_alpha_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:latest
    container_name: alpha_mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongo_alpha_data:/data/db

  redis:
    image: redis:alpine
    container_name: alpha_redis
    ports:
      - "6380:6379"

  # ── Telephony Engine — FreeSWITCH (replaces Twilio) ──────────────────────
  # Open-source SIP/WebRTC engine. SIP.js browser → FreeSWITCH → PSTN/SIP trunk
  freeswitch:
    image: drachtio/drachtio-freeswitch-min:latest
    container_name: alpha_freeswitch
    network_mode: host        # Required for SIP/RTP
    volumes:
      - freeswitch_config:/etc/freeswitch
      - call_recordings:/var/lib/freeswitch/recordings
    environment:
      - ESL_PASSWORD=ClueCon   # node-esl connects with this password
    restart: unless-stopped

  # ── STUN/TURN Server — Coturn (WebRTC NAT traversal) ────────────────────
  # Required for browser WebRTC to work across NAT/firewalls
  coturn:
    image: coturn/coturn:latest
    container_name: alpha_coturn
    network_mode: host
    command: >
      --listening-port=3478
      --tls-listening-port=5349
      --realm=crm.local
      --use-auth-secret
      --static-auth-secret=alpha-coturn-secret-change-in-prod
      --no-stdout-log
    restart: unless-stopped

  # ── Phase 4: Workflow Automation ──
  n8n:
    image: n8nio/n8n:latest
    container_name: alpha_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=alpha123
      - WEBHOOK_URL=http://localhost:5678/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=alpha_postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=alpha_n8n
      - DB_POSTGRESDB_USER=arpit
      - DB_POSTGRESDB_PASSWORD=password123
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    restart: unless-stopped

  # ── Phase 5: Search Engine ──
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: alpha_meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=alpha-search-key
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

  # ── Phase 5: Enterprise Integrations ──
  minio:
    image: minio/minio:latest
    container_name: alpha_minio
    ports:
      - "9001:9000"
      - "9002:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: alpha_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: alpha_grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # node-exporter:
  #   image: prom/node-exporter:latest
  #   container_name: alpha_node_exporter
  #   volumes:
  #     - /proc:/host/proc:ro
  #     - /sys:/host/sys:ro
  #     - /:/rootfs:ro
  #   command:
  #     - '--path.procfs=/host/proc'
  #     - '--path.sysfs=/host/sys'
  #     - --collector.filesystem.ignored-mount-points
  #     - "^/(sys|proc|dev|host|etc)($|/)"
  #   ports:
  #     - "9101:9100"
