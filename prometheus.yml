global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'alpha_backend'
    static_configs:
      - targets: ['host.docker.internal:3001']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['alpha_node_exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['alpha_cadvisor:8080']
